rules:
  - id: raw-sql-string-format
    pattern: |
      $CURSOR.execute("..." % ...)
    message: "Potential SQL injection via string formatting. Use parameterized queries."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021

  - id: raw-sql-format-method
    pattern: |
      $CURSOR.execute("...".format(...))
    message: "Potential SQL injection via .format(). Use parameterized queries."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021

  - id: raw-sql-fstring
    pattern: |
      $CURSOR.execute(f"...")
    message: "Potential SQL injection via f-string. Use parameterized queries."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021

  - id: subprocess-shell-true
    patterns:
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
    message: "Command injection risk: shell=True passes input to a shell."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-78
      owasp: A03:2021

  - id: os-system-variable
    pattern: os.system($CMD)
    message: "os.system() with variable input is a command injection risk."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-78
      owasp: A03:2021

  - id: path-traversal-open
    pattern: open($PATH, ...)
    message: "Potential path traversal if path includes user-controlled input."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: CWE-22
      owasp: A01:2021
