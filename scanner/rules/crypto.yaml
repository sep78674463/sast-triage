rules:
  - id: weak-hash-md5
    patterns:
      - pattern: hashlib.md5(...)
      - pattern: MD5(...)
    message: "MD5 is cryptographically broken. Use SHA-256 or SHA-3 for security purposes."
    languages: [python, javascript, java]
    severity: WARNING
    metadata:
      cwe: CWE-327
      owasp: A02:2021

  - id: weak-hash-sha1
    patterns:
      - pattern: hashlib.sha1(...)
      - pattern: SHA1(...)
    message: "SHA-1 is deprecated for security use. Use SHA-256 or SHA-3."
    languages: [python, javascript, java]
    severity: WARNING
    metadata:
      cwe: CWE-327
      owasp: A02:2021

  - id: aes-ecb-mode
    pattern: AES.new($KEY, AES.MODE_ECB)
    message: "AES-ECB mode does not provide semantic security. Use AES-GCM or AES-CBC with HMAC."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: CWE-327
      owasp: A02:2021

  - id: weak-random
    patterns:
      - pattern: random.random()
      - pattern: random.randint(...)
      - pattern: Math.random()
    message: "Cryptographically weak PRNG. Use secrets.token_bytes() or crypto.getRandomValues()."
    languages: [python, javascript]
    severity: WARNING
    metadata:
      cwe: CWE-338
      owasp: A02:2021
