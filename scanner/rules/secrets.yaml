rules:
  - id: hardcoded-password-assignment
    patterns:
      - pattern: password = "..."
      - pattern: passwd = "..."
      - pattern: secret = "..."
      - pattern: api_key = "..."
      - pattern: token = "..."
    pattern-not-regex: '(?i)(placeholder|changeme|your[_-]?key|example|test|fake|dummy|xxx|<)'
    message: "Potential hardcoded credential. Use environment variables or a secrets manager."
    languages: [python, javascript, typescript, java, go]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A07:2021

  - id: hardcoded-aws-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: "AWS access key ID pattern detected in source."
    languages: [python, javascript, typescript, java, go, generic]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A07:2021

  - id: private-key-pem
    pattern-regex: '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
    message: "Private key material detected in source file."
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-321
      owasp: A02:2021
